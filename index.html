<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Intra - Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
</head>
<body class="min-h-screen bg-gradient-to-br from-slate-950 via-slate-900 to-slate-950 text-white flex items-center justify-center px-4">

  <main class="w-full max-w-md">
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-20 h-20 rounded-2xl mb-4 p-2">
        <img src="./assets/logo.png" alt="Logo" class="w-full h-full object-contain" />
      </div>
      <h1 class="text-4xl font-bold bg-gradient-to-r from-[#10CFC9] to-[#14E5DD] bg-clip-text text-transparent">Intra Dashboard</h1>
      <p class="text-slate-400 mt-2">Sign in to access your profile data in Intra</p>
    </div>

    <section class="bg-slate-900/50 backdrop-blur-sm border border-slate-800 rounded-2xl shadow-2xl p-8">
      <form id="login-form" class="space-y-5">
        <div>
          <label for="usernameOrEmail" class="block text-sm font-medium text-slate-200 mb-2">
            <i class="fas fa-user mr-2 text-[#10CFC9]"></i>Username / Email
          </label>
          <input id="usernameOrEmail" name="usernameOrEmail" type="text" required placeholder="Enter username or email"
            class="w-full rounded-xl border border-slate-700 bg-slate-950/70 px-4 py-3 text-white placeholder:text-slate-500 outline-none focus:border-[#10CFC9] focus:ring-2 focus:ring-[#10CFC9]/20 transition"
          />
        </div>

        <div>
          <label for="password" class="block text-sm font-medium text-slate-200 mb-2">
            <i class="fas fa-lock mr-2 text-[#10CFC9]"></i>Password
          </label>
          <div class="relative">
            <input id="password" name="password" type="password" required placeholder="Enter password" 
              class="w-full rounded-xl border border-slate-700 bg-slate-950/70 px-4 py-3 pr-12 text-white placeholder:text-slate-500 outline-none focus:border-[#10CFC9] focus:ring-2 focus:ring-[#10CFC9]/20 transition"
            />
            <button type="button" id="toggle-password" class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-[#10CFC9] transition cursor-pointer touch-manipulation" aria-label="Toggle password visibility">
              <i class="fas fa-eye" id="password-icon"></i>
            </button>
          </div>
        </div>

        <p id="error-message" class="min-h-[20px] text-sm text-red-400"></p>

        <button id="login-btn" type="submit" class="w-full rounded-xl bg-gradient-to-r from-[#10CFC9] to-[#0EA5A0] px-4 py-3 font-semibold text-slate-950 transition hover:shadow-lg hover:shadow-[#10CFC9]/30 hover:scale-105 transform duration-200">
          <i class="fas fa-sign-in-alt mr-2"></i>Login
        </button>
      </form>
    </section>
  </main>

  <script type="module" src="./js/login.js"></script>
</body>
</html>
